<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Meal Planner for Dietary Needs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Weekly Meal Planner for Dietary Needs</h1>
            <p class="subtitle">Get personalized meal plans tailored to your dietary preferences</p>
        </header>

        <main>
            <!-- Widget 1: Dietary Preferences (User Input) -->
            <section class="widget widget-input">
                <label for="dietary-preferences">Dietary Preferences</label>
                <textarea
                    id="dietary-preferences"
                    placeholder="Enter your dietary preferences (e.g., vegetarian, keto, gluten-free, dairy-free...)"
                    rows="3"
                ></textarea>
            </section>

            <!-- Run All Button -->
            <div class="actions">
                <button id="run-all-btn" class="btn-run">Run All</button>
            </div>

            <!-- Widget 2: Your Meal Plan (AI Output) -->
            <section class="widget widget-output">
                <label>Your Meal Plan</label>
                <div id="meal-plan-output" class="output-panel">
                    <p class="placeholder-text">Your personalized meal plan will appear here...</p>
                </div>
                <div id="meal-plan-error" class="error-message" hidden></div>
            </section>
        </main>

        <footer>
            <p>Powered by Amazon Bedrock &amp; Claude</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
